name: Coverity scan

on: push

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-24.04
    
    steps:
    - name: download Coverity tool
      run: |
        wget -q https://scan.coverity.com/download/cxx/linux64 --post-data "token=$TOKEN&project=samcmill/wassail" -O cov-analysis-linux64.tar.gz
        mkdir /tmp/cov-analysis-linux64
        tar -xzf cov-analysis-linux64.tar.gz --strip 1 -C /tmp/cov-analysis-linux64
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}

    - uses: actions/checkout@v6

    - name: install dependencies
      run: |
        sudo apt-get update -y
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y autoconf autoconf-archive automake ca-certificates curl file gnupg libtool make pkg-config libibumad-dev libopenmpi-dev libpciaccess-dev libssh-dev libudev-dev openmpi-bin openssh-client software-properties-common wget
        wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update -y
        sudo apt-get install -y cuda-nvml-dev-13-1
        echo "CPATH=/usr/local/cuda-13.1/include:$CPATH" >> $GITHUB_ENV

    - name: autogen
      run: ./autogen.sh

    - name: configure
      run: ./configure --disable-python

    - name: make
      run: |
        /tmp/cov-analysis-linux64/bin/cov-build --dir cov-int make

    - name: submit
      run: |
        tar -czvf wassail.tgz cov-int
        curl \
          --form project=samcmill/wassail \
          --form token=$TOKEN \
          --form email=scott.andrew.mcmillan@gmail.com \
          --form file=@wassail.tgz \
          --form version=master \
          --form description="https://github.com/samcmill/wassail" \
          https://scan.coverity.com/builds?project=samcmill/wassail
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
