name: Code coverage 

on: push

jobs:
  build:

    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v6

    - name: install dependencies
      run: |
        sudo apt-get update -y
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y autoconf autoconf-archive automake ca-certificates file gnupg lcov libtool make pkg-config libibumad-dev libopenmpi-dev libpciaccess-dev libssh-dev openmpi-bin openssh-client software-properties-common wget
        wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update -y
        sudo apt-get install -y cuda-nvml-dev-13-1
        echo "CPATH=/usr/local/cuda-13.1/include:$CPATH" >> $GITHUB_ENV

    - name: autogen
      run: ./autogen.sh

    - name: configure
      run: ./configure --enable-code-coverage --disable-python

    - name: make
      run: make -j$(nproc)

    - name: make check-code-coverage
      run: CODE_COVERAGE_LCOV_RMOPTS="--ignore-errors unused" CODE_COVERAGE_OUTPUT_FILE=wassail-coverage.info VERBOSE=1 make check-code-coverage -j$(nproc)

    - name: Coveralls
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: ./wassail-coverage.info
